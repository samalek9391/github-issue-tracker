<!doctype html>
<html lang="en">
  <head>

    <title>GitHub Issue Tracker</title>

    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <!-- Login Section -->
    <div id="signin-section">
      <h2>Sign In</h2>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden">
      <h1>Welcome to Dashboard</h1>
    </div>


<script src="./script.js"></script>

</html>
