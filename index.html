<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>

    <link rel="stylesheet" href="./style.css" />

    <!-- Tailwind CSS and DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div
      id="signin-section"
      class="bg-[#F8FAFC] min-h-screen flex items-center justify-center"
    >
      <div class="card w-full max-w-md bg-white shadow-xl p-6">
        <div class="flex justify-center mb-6">
          <img class="" src="./assets/github-logo.png" alt="" />
        </div>

        <h2 class="text-center text-[24px] font-semibold">
          GitHub Issues Tracker
        </h2>
        <p class="text-[#64748B] text-center mb-6">
          Sign in to manage your issues
        </p>

        <!-- Login Section -->
        <div class="flex justify-center">
          <fieldset class="fieldset w-full p-4">
            <label class="label text-[#1F2937] font-medium">Username</label>
            <input
              id="username"
              type="text"
              class="input w-full"
              placeholder="Enter Username"
            />
            <p class="text-[#4A00FF] mb-4">Default: admin</p>

            <label class="label text-[#1F2937] font-medium">Password</label>
            <input
              id="password"
              type="password"
              class="input w-full"
              placeholder="Enter Password"
            />
            <p class="text-[#4A00FF] mb-4">Default: admin123</p>

            <button id="signin-btn" class="btn btn-primary mt-4">
              Sign In
            </button>
          </fieldset>
        </div>
        <!-- Divider -->
        <div class="divider mt-6 mb-6">OR</div>

        <!-- Demo credentials -->
        <p class="text-gray-500 mb-2 text-center mb-2">Demo Credentials:</p>
        <div class="bg-gray-100 p-6 rounded-lg text-sm text-center">
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </div>

    <!-- Dashboard Section -->
    <section id="dashboard-section" class="hidden">
      <!-- Nav bar section -->
      <div class="bg-[#E9E9E9] w-full">
        <div class="w-11/12 mx-auto flex justify-between items-center p-4">
          <!-- Logo -->
          <div class="flex items-center gap-1">
            <img class="w-9" src="./assets/github-logo.png" alt="" />
            <h2>GitHub Issues Tracker</h2>
          </div>
          <!-- Search and Button -->
          <div class="flex items-center gap-4">
            <label class="input">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
            <input id="search-input" type="search" placeholder="Search..." />
            </label>
            <button class="btn btn-primary">+ New Issue</button>
          </div>
        </div>
      </div>

      <div class="main-container bg-[#F8FAFC] w-full pt-15 pb-4">
        <!-- toggle Section -->
        <div
          id="toogle-section"
          class="bg-white w-9/12 mx-auto p-6 shadow-sm rounded-lg mb-4"
        >
          <button class="tab-btn active" data-status="all">All</button>
          <button class="tab-btn" data-status="open">Open</button>
          <button class="tab-btn" data-status="closed">Closed</button>
        </div>

        <!-- Issue count section -->

        <div
          id="count-section"
          class="flex justify-between items-center bg-white w-9/12 mx-auto p-6 shadow-sm rounded-lg"
        >
          <div id="count-container" class="flex gap-2">
            <div
              class="logo-image w-[50px] bg-[#ECE4FF] rounded-full flex items-center justify-center"
            >
              <img
                class="h-[32px] w-[32px]"
                src="./assets/Aperture.png"
                alt=""
              />
            </div>

            <div>
              <h2 id="all-count">50 Issues</h2>
              <p>Track and manage your project issues</p>
            </div>
          </div>

          <!-- Count Legeand -->
          <div
            id="count-legeand"
            class="flex justify-between items-center gap-4"
          >
            <!-- Open Legeand -->
            <div class="flex justify-center items-center gap-1">
              <div
                id="open-color"
                class="bg-green-500 w-3 h-3 rounded-full"
              ></div>
              <p>Open</p>
            </div>

            <!-- Closed Legeand -->
            <div class="flex justify-center items-center gap-1">
              <div
                id="open-color"
                class="bg-purple-500 w-3 h-3 rounded-full"
              ></div>
              <p>Closed</p>
            </div>
          </div>
        </div>
         
        <!-- Loader -->

        <div id="loader" class="flex justify-center items-center text-center p-10 hidden">
          <span class="loading loading-spinner loading-xl"></span>
        </div>


        <!-- issue card section -->
        <div
          id="issues-cards"
          class="grid grid-cols-4 gap-4 bg-white w-9/12 mx-auto p-6 shadow-sm rounded-lg"
        >
          <!-- card design -->
        </div>
      </div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
